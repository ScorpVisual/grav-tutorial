version: '3.8'

services:
  php:
    build:
      context: ./docker/php  # Ścieżka do katalogu z Dockerfile dla PHP
      dockerfile: Dockerfile
    container_name: grav_php_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html  # Montuje cały Twój projekt Grav do kontenera
      # Możesz odkomentować poniższą linię, jeśli chcesz użyć własnego php.ini
      # - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    expose:
      - "9000" # PHP-FPM nasłuchuje na porcie 9000

  nginx:
    image: nginx:alpine
    container_name: grav_web_server
    restart: unless-stopped
    ports:
      - "8080:80"  # Twój host port 8080 mapuje na port 80 kontenera Nginx
    volumes:
      - ./:/var/www/html  # Montuje projekt Grav, aby Nginx miał dostęp do plików statycznych
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf # Konfiguracja Nginx
    depends_on:
      - php # Nginx zależy od serwisu PHP