name: Kocietexty
slug: kocietexty
type: theme
version: 0.1.0
description: Theme for kocieTexty new website
icon: rebel
author:
  name: Marcel Czowalla kocieTexty
  email: kocietexty@gmail.com
homepage: https://github.com/84789108/grav-theme-kocietexty
demo: http://demo.yoursite.com
keywords: grav, theme, etc
bugs: https://github.com/84789108/grav-theme-kocietexty/issues
readme: https://github.com/84789108/grav-theme-kocietexty/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
    validation: loose
    fields:
        dropdown.enabled:
            type: toggle
            label: Dropdown in Menu
            highlight: 1
            default: 1
            options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
            validate:
                type: bool
        production:
            type: toggle
            label: Production Mode
            highlight: 1
            default: 1
            options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
            validate:
                type: bool
