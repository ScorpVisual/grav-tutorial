title: Granity
'@extends':
  type: default
  context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Treść modułu
          fields:
            header.recommended_granites_promo_image:
              type: filepicker
              folder: 'theme://images/photos'
              preview_images: true
              label: Zdjęcie promocyjne dla sekcji
            header.recommended_text:
              type: textarea
              label: Tekst wprowadzający do polecanych kamieni
              default: 'Poniżej prezentujemy listę kamieni, które najlepiej komponują się z tym modelem nagrobka, gwarantując zarówno estetykę, jak i wyjątkową trwałość.'
            header.recommended_granites:
              name: recommended_granites
              type: list
              label: Lista polecanych granitów do karuzeli
              style: vertical
              fields:
                .name:
                  type: text
                  label: Nazwa kamienia
                .desc:
                  type: textarea
                  label: Krótki opis
                .img:
                  type: filepicker
                  folder: 'theme://images/textures'
                  preview_images: true
                  label: Zdjęcie tekstury kamienia