title: 'Sekcja: O nas (podział)'
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Treść
          fields:
            header.image:
              type: pagemedia
              label: Obrazek
              help: 'Wybierz obrazek, który pojawi się po lewej stronie.'

            header.pre_title:
              type: text
              label: 'Nagłówek (czerwony)'
              default: 'Kamieniarstwo Wiśniewski:'

            header.main_title:
              type: text
              label: 'Główny nagłówek'
              default: 'Zaufany zakład kamieniarski na Śląsku'
            
            content:
              type: markdown
              label: 'Treść akapitów'
              help: 'Każdy akapit zostanie wyświetlony osobno.'
              
            header.buttons:
              type: list
              label: Przyciski
              fields:
                .text:
                  type: text
                  label: Tekst przycisku
                .url:
                  type: text
                  label: Link (URL)
                .class:
                  type: select
                  label: Styl przycisku
                  default: 'btn-primary'
                  options:
                    'btn-primary flex-grow text-center': 'Podstawowy'
                    'btn-cta flex-grow text-center': 'CTA (Wezwanie do akcji)'