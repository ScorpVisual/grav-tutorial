title: Custom Hero Section
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Treść Hero
          fields:

            # Pole na obrazek tła
            header.hero_image:
              type: filepicker
              label: Wybierz obraz tła Hero
              folder: 'theme@:/images/covers'
              preview_images: true
              accept:
                - .jpg
                - .png
                - .webp
              help: "Wybierz plik z folderu theme/images/covers"

            # Pole na podtytuł
            header.hero_subtitle:
              type: text
              label: Podtytuł (tekst pod głównym tytułem)
              help: "Wpisz tutaj tekst, który pojawi się pod tytułem strony."

            # Pole do zarządzania przyciskami (jako lista)
            header.hero_buttons:
              type: list
              label: Przyciski
              style: vertical
              fields:
                .text:
                  type: text
                  label: Tekst przycisku
                  validate:
                    required: true
                .url:
                  type: text
                  label: Link (URL)
                  validate:
                    required: true
                .class:
                  type: select
                  label: Wygląd przycisku
                  default: 'btn-primary'
                  options:
                    'btn-primary': 'Podstawowy (Primary)'
                    'btn-cta': 'Wezwanie do akcji (CTA)'

        advanced:
          type: tab
          title: Zaawansowane
          fields:
            # Tutaj możesz przenieść standardowe pola, jeśli chcesz
            # np. folder, parent, etc.