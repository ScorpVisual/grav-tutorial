        # ==========================================================
        # ZAKŁADKA 5: CECHY (FEATURES)
        # ==========================================================
        features_tab:
          type: tab
          title: ⭐ Cechy
          fields:
            header.features_title:
              type: text
              label: Tytuł sekcji Cechy
              default: "Cechy produktu"
            header.features_subtitle:
              type: textarea
              label: Podtytuł sekcji Cechy

            header.features:
              type: list
              label: Lista Cech (Ikony)
              fields:
                .title:
                  type: text
                  label: Tytuł cechy
                .text:
                  type: textarea
                  label: Opis cechy
                .icon:
                  type: text
                  label: Nazwa pliku ikony (w images/icons/)
                .alt:
                  type: text
                  label: Alt ikony
              default:
                - title: "Mrozoodporność i niska nasiąkliwość"
                  text: "Granit wyróżnia się niską porowatością, dlatego jest całkowicie odporny na deszcz, śnieg i skrajne temperatury."
                  icon: "tombstone.svg"
                  alt: "Ikona nagrobka odpornego na mróz"
                - title: "Trwały poler"
                  text: "Granitowe płyty poddajemy mechanicznej obróbce, która zamyka pory kamienia, tworząc idealnie gładką, lustrzaną taflę, odporną na osadzanie się mchu i brudu. Taka powierzchnia ułatwia czyszczenie pomnika."
                  icon: "tombstone.svg"
                  alt: "Ikona trwałego poleru"
                - title: "Gwarancja satysfakcji"
                  text: "Twoje zadowolenie jest naszym priorytetem. Służymy wsparciem na każdym etapie realizacji zamówienia."
                  icon: "tombstone.svg"
                  alt: "Ikona gwarancji"

        # ==========================================================
        # ZAKŁADKA 6: GALERIA
        # ==========================================================
        gallery_tab:
          type: tab
          title: 🖼️ Galeria
          fields:
            header.gallery_items:
              type: list
              label: Zdjęcia w galerii
              fields:
                .image_filename:
                  type: filepicker
                  label: Wybierz zdjęcie
                  preview_images: true
                  folder: 'theme@:/images/products/gallery'
                .title:
                  type: text
                  label: Podpis (Alt/Overlay)

        # ==========================================================
        # ZAKŁADKA 7: FAQ
        # ==========================================================
        faq_tab:
          type: tab
          title: ❓ FAQ
          fields:
            header.faq_title:
              type: text
              label: Tytuł FAQ
              default: "Najczęstsze pytania"
            header.faq_items:
              type: list
              label: Pytania
              fields:
                .question:
                  type: text
                  label: Pytanie
                .answer:
                  type: textarea
                  label: Odpowiedź
              # default:
              #   - question: "Kiedy można postawić pomnik po pogrzebie?"
              #     answer: "Optymalny czas na postawienie nagrobka to <strong>ok. 6 miesięcy po pogrzebie</strong> (jeśli nie ma silnych mrozów). Głównym powodem jest <strong>naturalne osiadanie gruntu</strong>. Po pochówku ziemia jest rozluźniona i potrzebuje czasu oraz opadów atmosferycznych, aby odpowiednio się zagęścić. Zbyt szybki montaż ciężkiego, granitowego pomnika na niestabilnym podłożu może doprowadzić do <strong>przechylenia się nagrobka</strong>, pęknięcia betonowej ramy, lub uszkodzenia elementów kamiennych. \n\n W przypadku <strong>grobowców murowanych</strong>, czyli tzw. piwniczek, montaż pomnika jest możliwy niemal natychmiast po pogrzebie. Konstrukcja opiera się na <strong>betonowych fundamentach</strong>, a nie na luźnej ziemi, więc nie ma ryzyka, że nagrobek się zapadanie."

              #   - question: "Ile trwa realizacja zamówienia na nagrobek?"
              #     answer: "Czas oczekiwania na realizację nagrobka wynosi zazwyczaj <strong>od 3 do 8 tygodni</strong>. Ostateczny termin zależy jednak od stopnia skomplikowania projektu oraz dostępności wybranego kamienia. Jeśli wybierzesz gotowy wzór z ekspozycji zamontujemy nagrobek szybciej, natomiast <strong>projekty indywidualne</strong> lub sprowadzanie rzadkich granitów mogą wydłużyć proces do kilku miesięcy. \n\n Podczas planowania zamówienia, prosimy o uwzględnienie <strong>sezonowości (duże obłożenie przed 1 listopada)</strong> oraz czas potrzebny na uzyskanie formalnych zgód od administracji cmentarza."

              #   - question: "Od czego zależy cena nagrobka?"
              #     answer: "Cena nagrobka zależy przede wszystkim od <strong>rodzaju granitu oraz wymiarów pomnika</strong>. Na końcowy koszt istotnie wpływa również stopień skomplikowania projektu, np. niestandardowe kształty, rzeźbienia, grubość płyt, <strong>rodzaj wybranych liter</strong> oraz dodatki. Ważnym elementem wyceny jest także zakres prac montażowych oraz ewentualna konieczność <strong>demontażu starego nagrobka</strong>."

              #   - question: "Czy cena obejmuje montaż i litery?"
              #     answer: "Bazowa cena nagrobka obejmuje przygotowanie elementów kamiennych oraz ich <strong>montaż na zbrojonym fundamencie</strong>. Ze względu na ogromną różnorodność technik wykonania <strong>liternictwo oraz dodatki</strong> w postaci ławeczek, wazonów, mis, lampionów, rzeźb, czy grawerunku, <strong>wyceniamy oddzielnie</strong>."

              #   - question: "Jakie formalności muszę załatwić w administracji cmentarza przed montażem?"
              #     answer: "Realizacja pomnika na terenie cmentarza wiąże się z koniecznością <strong>zgłoszenia planowanych prac w biurze administracji</strong>. W tym celu musisz przedstawić <strong>uprawnienia do opieki nad grobem</strong> oraz wnieść wymagane opłaty za nadzór i udostępnienie terenu. Uzyskanie stosownego zezwolenia gwarantuje, że montaż odbędzie się w wyznaczonym terminie i zgodnie ze <strong>standardami technicznymi</strong> obowiązującymi na danym obiekcie."

        # ==========================================================
        # ZAKŁADKA 8: ARTYKUŁY
        # ==========================================================
        articles_tab:
          type: tab
          title: 📰 Artykuły
          fields:
            header.articles_title:
              type: text
              label: Tytuł sekcji Artykuły
              default: "Dowiedz się więcej z naszych artykułów"
            header.articles_text:
              type: textarea
              label: Tekst wprowadzający
              default: "Dowiedz się więcej o naszych usługach kamieniarskich, projektowaniu nagrobków i renowacji pomników poprzez nasze artykuły i porady ekspertów."

            header.articles:
              type: list
              label: Wybrane artykuły
              fields:
                .title:
                  type: text
                  label: Tytuł
                .hero_subtitle:
                  type: text
                  label: Podtytuł
                .description:
                  type: textarea
                  label: Zajawka
                .image_src:
                  type: filepicker
                  label: Obrazek
                  folder: 'theme@:/images/articles'
                .url:
                  type: text
                  label: Link
                .date:
                  type: text
                  label: Data
                .category:
                  type: text
                  label: Kategoria
              default:
                - title: "Nowoczesne trendy w kamieniarstwie"
                  hero_subtitle: "Innowacje i Design"
                  description: "Odkryj minimalistyczne formy i innowacyjne materiały, które zyskują na popularności w projektowaniu nagrobków."
                  image_src: "services-photo.jpg"
                  url: "#"
                  date: "20-09-2025"
                  category: "Inspiracje"
                - title: "Jak dbać o nagrobek z granitu?"
                  hero_subtitle: "Poradnik Pielęgnacji"
                  description: "Praktyczne porady dotyczące czyszczenia i konserwacji granitu, aby zachował swój blask na długie lata."
                  image_src: "stones-photo-2.jpg"
                  url: "#"
                  date: "15-09-2025"
                  category: "Porady"
                - title: "Personalizacja pomnika – co warto wiedzieć?"
                  hero_subtitle: "Unikalny Charakter"
                  description: "Od grawerunku po rzeźbę - poznaj możliwości personalizacji, które nadadzą pomnikowi unikalny charakter."
                  image_src: "stones-photo.jpg"
                  url: "#"
                  date: "10-09-2025"
                  category: "Wiedza"