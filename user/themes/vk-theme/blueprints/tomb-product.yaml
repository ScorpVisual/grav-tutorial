              #     short_desc: "Elementy rzeźbiarskie realizujemy we współpracy z profesjonalnym artystą, wyłącznie na Twoje indywidualne zamówienie."
              #     full_desc: "Wykonujemy autorskie płaskorzeźby, wizerunki oraz pełne figury kute ręcznie w masie kamienia. Ze względu na unikatowy charakter dzieła, czas oczekiwania podlega odrębnym ustaleniom."
              #     price: "Wycena indywidualna"
              #     image: "addons-sculpture.jpg"
              #     alt_text: "Rzeźba w kamieniu"
              #   - name: "Galanteria"
              #     title: "Galanteria nagrobkowa"
              #     short_desc: "Misy, wazony i latarnie toczymy z litego granitu dopasowanego do barwy nagrobka lub wykonujemy z mosiądzu."
              #     full_desc: "Każdy element jest wyposażony w otwór drenażowy zapobiegający pękaniu zimą. Montaż realizujemy metodą kotwienia na szpilki ze stali kwasoodpornej oraz przy użyciu specjalistycznych spoiw kamieniarskich."
              #     price: ""
              #     image: "addons-vase-square-alt-2.jpg"
              #     alt_text: "Wazony i galanteria nagrobkowa"
              #   - name: "Ławeczki"
              #     title: "Ławeczki"
              #     short_desc: "Proponujemy rozwiązania w trzech wariantach: stalowe, z tworzywa PCV oraz z granitu w odcieniu nagrobka."
              #     full_desc: "Ławeczki możemy dodatkowo wyposażyć w funkcję składania oraz zintegrowany schowek. Całość osadzamy trwale w podłożu na ławie betonowej."
              #     price: ""
              #     image: "addons-bench-2-square.jpg"
              #     alt_text: "Ławeczka przygrobnia"
              #   - name: "Grawerunek"
              #     title: "Grawerunek laserowy"
              #     short_desc: "Przenosimy na kamień każdą formę graficzną – wizerunki, ornamentykę oraz indywidualne kompozycje."
              #     full_desc: "Wiązka lasera usuwa warstwę poleru, odsłaniając jasną strukturę kamienia. Dzięki temu uzyskujemy obraz o fotograficznej jakości i idealnym odwzorowaniu detali. Powierzchnię pokrywamy chemią kamieniarską, aby zabezpieczyć grawerunek przed czynnikami zewnętrznymi."
