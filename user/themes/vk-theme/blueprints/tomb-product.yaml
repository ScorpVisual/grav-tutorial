title: Produkt (Hero + Warianty)
'@extends':
  type: default
  context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        # ==========================================================
        # ZAKŁADKA 1: HERO
        # ==========================================================
        hero_tab:
          type: tab
          title: 🏠 Hero (Góra)
          fields:
            header.custom_hero_section:
              type: section
              title: Ustawienia Sekcji Hero
              underline: true

            header.hero_image:
              type: filepicker
              label: Wybierz obraz tła Hero
              folder: 'theme@:/images/covers'
              preview_images: true
              accept:
                - .jpg
                - .png
                - .webp

            header.hero_subtitle:
              type: textarea
              label: Podtytuł Hero
              rows: 3

            header.hero_buttons:
              type: list
              label: Przyciski Hero
              style: vertical
              fields:
                .text:
                  type: text
                  label: Tekst przycisku
                .url:
                  type: text
                  label: Link (URL)
                .class:
                  type: select
                  label: Styl przycisku
                  default: 'btn-primary'
                  options:
                    'btn-primary': 'Podstawowy'
                    'btn-cta': 'Cherry CTA'

        # ==========================================================
        # ZAKŁADKA 2: DANE PRODUKTU (WARIANTY)
        # ==========================================================
        product_tab:
          type: tab
          title: 💎 Produkt i Warianty
          fields:
            header.top_label:
              type: text
              label: Etykieta sekcji produktu
              default: "Wybierz wersję produktu"
              help: "Mały nagłówek nad sekcją wyboru wariantów"

            header.product_variants:
              type: list
              label: Warianty Produktu (Ceny i Wymiary)
              style: vertical
              fields:
                .title:
                  type: text
                  label: Nazwa systemowa wariantu
                .size:
                  type: text
                  label: Etykieta przycisku
                .price:
                  type: text
                  label: Cena
                .img:
                  type: filepicker
                  label: Zdjęcie wariantu
                  # Startujemy w katalogu głównym produktów
                  folder: 'user://themes/vk-theme/images/products'
                  # WAŻNE: recurse: true pozwala klikać w podfoldery (jak product-02)
                  recurse: true
                  preview_images: true
                  accept:
                    - image/*
                .full_desc:
                  type: textarea
                  label: Opis wariantu (HTML dozwolony)
                  rows: 4

        # ==========================================================
        # ZAKŁADKA 3: KAMIENIE
        # ==========================================================
        stones_tab:
          type: tab
          title: 🪨 Kamienie
          fields:
            header.stones_title:
              type: text
              label: Nagłówek sekcji kamieni
              default: "Polecane kamienie"

            header.selected_stones:
              type: checkboxes
              label: Wybierz dostępne kamienie
              help: "Zaznacz klucze kamieni zdefiniowane w pliku konfiguracyjnym."
              use: keys
              classes: stone-grid-wrapper
              data-options@: '\Grav\Theme\VkTheme::getStoneOption'

        # ==========================================================
        # ZAKŁADKA 4: GALANTERIA (DODATKI)
        # ==========================================================
        addons_tab:
          type: tab
          title: ⚱️ Galanteria
          fields:
            header.addons_title:
              type: text
              label: Tytuł sekcji dodatków
              default: "Galanteria"

            header.product_addons:
              type: list
              label: Lista Dodatków
              style: vertical
              fields:
                .name:
                  type: text
                  label: Nazwa (Menu)
                .title:
                  type: text
                  label: Tytuł (Nagłówek treści)
                .short_desc:
                  type: textarea
                  label: Krótki opis (Menu)
                .full_desc:
                  type: textarea
                  label: Pełny opis (Treść)
                .price:
                  type: text
                  label: Cena
                .image:
                  type: filepicker
                  label: Zdjęcie
                  folder: 'theme@:/images/products/addons'
                  preview_images: true
                .alt_text:
                  type: text
                  label: Alt Text
              # default:
              #   - name: "Liternictwo"
              #     title: "Liternictwo nagrobkowe"
              #     short_desc: "Każdy napis projektujemy indywidualnie, uwzględniając unikalną strukturę i barwę wybranego granitu."
