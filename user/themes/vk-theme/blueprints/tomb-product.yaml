title: Produkt (Hero + Warianty)
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1

      fields:
        # ==========================================================
        # ZAKŁADKA 1: HERO
        # ==========================================================
        hero_tab:
          type: tab
          title: 🏠 Hero (Góra)
          fields:
            header.custom_hero_section:
              type: section
              title: Ustawienia Sekcji Hero
              underline: true

            header.hero_image:
              type: filepicker
              label: Wybierz obraz tła Hero
              folder: 'theme@:/images/covers'
              value: name
              preview_images: true
              accept:
                - .jpg
                - .png
                - .webp

            header.hero_subtitle:
              type: textarea
              label: Podtytuł Hero
              rows: 3

            header.hero_buttons:
              type: list
              label: Przyciski Hero
              style: vertical
              fields:
                .text:
                  type: text
                  label: Tekst przycisku
                .url:
                  type: text
                  label: Link (URL)
                .class:
                  type: select
                  label: Styl przycisku
                  default: 'btn-primary'
                  options:
                    'btn-primary': 'Podstawowy'
                    'btn-cta': 'Cherry CTA'

        # ==========================================================
        # ZAKŁADKA 2: DANE PRODUKTU (WARIANTY)
        # ==========================================================
        product_tab:
          type: tab
          title: 💎 Produkt i Warianty
          fields:
            header.top_label:
              type: text
              label: Etykieta sekcji produktu
              default: "Wybierz wersję produktu"
              help: "Mały nagłówek nad sekcją wyboru wariantów"

            header.product_variants:
              type: list
              label: Warianty Produktu (Ceny i Wymiary)
              style: vertical
              fields:
                .title:
                  type: text
                  label: Nazwa systemowa wariantu
                .size:
                  type: text
                  label: Etykieta przycisku
                .price:
                  type: text
                  label: Cena
                .img:
                  type: filepicker
                  label: Zdjęcie wariantu
                  folder: 'theme@:/images/products'
                  preview_images: true
                  accept:
                    - image/*
                .full_desc:
                  type: textarea
                  label: Opis wariantu (HTML dozwolony)
                  rows: 4

        # ==========================================================
        # ZAKŁADKA 3: KAMIENIE
        # ==========================================================
        stones_tab:
          type: tab
          title: 🪨 Kamienie
          fields:
            header.stones_title:
              type: text
              label: Nagłówek sekcji kamieni
              default: "Polecane kamienie"
            
            header.selected_stones:
              type: checkboxes
              label: Wybierz dostępne kamienie
              help: "Zaznacz klucze kamieni zdefiniowane w pliku konfiguracyjnym."
              use: keys
              classes: stone-grid-wrapper
              data-options@: '\Grav\Theme\VkTheme::getStoneOption' 

        # ==========================================================
        # ZAKŁADKA 4: GALANTERIA (DODATKI) - Z DEFAULTAMI
        # ==========================================================
        addons_tab:
          type: tab
          title: ⚱️ Galanteria
          fields:
            header.addons_title:
              type: text
              label: Tytuł sekcji dodatków
              default: "Galanteria"
            
            header.product_addons:
              type: list
              label: Lista Dodatków
              style: vertical
              # --------------------------------------------------------
              # DOMYŚLNE WARTOŚCI DLA DODATKÓW (Na bazie Twojego HTML)
              # --------------------------------------------------------
              default:
                - name: "Galanteria Ogólna"
                  title: "Galanteria nagrobkowa"
                  short_desc: "Pamięć o bliskich może przybrać fizyczną formę. To ona sprawia, że zimny kamień staje się bliższy, bardziej ludzki."
                  full_desc: "Stworzyliśmy naszą kolekcję galanterii nagrobkowej właśnie po to – byś mógł nadać pomnikowi ten osobisty, ciepły wymiar. Rzeźbiony detal, przy którym zatrzymasz dłoń, ławeczka zapraszająca do chwili ciszy, wazon gotowy przyjąć żywy kolor kwiatów. To Twoje gesty miłości i pamięci, którym nadaliśmy trwałą, szlachetną formę. Każdy nagrobek przyozdobimy w wybrane przez Ciebie elementy z naszej oferty galanterii nagrobkowej."
                  price: ""
                  image: "addons-main.jpg"
                  alt_text: "Nowoczesny nagrobek wykonany przez Kamieniarstwo Wiśniewski"
                
                - name: "Ławeczki"
                  title: "Ławeczki nagrobkowe"
                  short_desc: "Wiemy, że każdy potrzebuje czegoś innego, by w spokoju przeżyć chwilę refleksji."
                  full_desc: "Jeśli Twoim celem jest stworzenie jednolitej, kamiennej kompozycji z pomnikiem, najlepszym rozwiązaniem będzie ławeczka granitowa. Gdy chcesz dodać przestrzeni klasycznej elegancji i szlachetnego detalu, najlepiej sprawdzi się kunsztowny metal. A jeśli po prostu szukasz wygodnego i trwałego siedziska, wybierz praktyczne, nowoczesne ławeczki z tworzywa."
                  price: ""
                  image: "addons-bench-2-square.jpg"
                  alt_text: "Granitowa ławeczka"

                - name: "Wazony"
                  title: "Wazony nagrobkowe"
                  short_desc: "Nasz klimat wymaga rozwiązań, które są odporne na mróz, deszcz i słońce."
                  full_desc: "Wazony z granitu, który jest naturalną skałą, są absolutnie niewrażliwe na cykle zamarzania i odmarzania. Integrujemy je z pomnikiem na stałe, eliminując ryzyko przypadkowego strącenia przez wiatr. Wazony z metali szlachetnych zabezpieczamy specjalnymi powłokami, które chronią je przed korozją i utratą koloru przez wiele lat."
                  price: ""
                  image: "addons-vase-square-alt-2.jpg"
                  alt_text: "Wazon nagrobkowy"

                - name: "Płyty i Księgi"
                  title: "Płyty, nakładki i kamienne księgi nagrobkowe"
                  short_desc: "Proces dodania nowego napisu do istniejącego pomnika jest prosty."
                  full_desc: "Jeśli na istniejącej płycie jest miejsce, bezpiecznie ją demontujemy, a w naszym warsztacie nanosimy nowe dane, odtwarzając styl napisu. Gdy potrzebujesz nowej przestrzeni, stworzymy ją, montując na pomniku elegancką nakładkę lub symboliczną kamienną księgę. Oferujemy także możliwość montażu całkowicie nowej płyty napisowej z granitu."
                  price: "od 800 PLN"
                  image: "addons-surnames-alt.jpg"
                  alt_text: "Płyty i księgi nagrobkowe"

                - name: "Rzeźby"
                  title: "Rzeźby nagrobkowe"
                  short_desc: "Jedna, prosta rzeźba potrafi zawrzeć w sobie całą miłość, tęsknotę i szacunek."
                  full_desc: "Postać anioła, symbolizująca nadzieję i ochronę lub krzyż upamiętniający mękę Chrystusa, przypominający o życiu wiecznym. Niezależnie od Twojej wizji z granitu, marmuru lub piaskowca wydobędziemy kształt, który stanie się wiecznym wyrazem Twoich najgłębszych uczuć."
                  price: "Wycena indywidualna"
                  image: "addons-sculpture.jpg"
                  alt_text: "Rzeźba nagrobkowa"

                - name: "Wylewki i Okładziny"
                  title: "Wylewki, płytki, okładziny"
                  short_desc: "Naszą pracę zawsze zaczynamy od oceny podłoża i jeśli to konieczne, tworzymy solidny fundament."
                  full_desc: "Tworzymy solidny, zbrojony fundament, który zabezpiecza teren przed zapadaniem i przesuwaniem się elementów. Dopiero na tak przygotowanym gruncie układamy wybrane przez Ciebie wykończenie: antypoślizgowy granit, eleganckie płytki lub klasyczną kostkę brukową. W ten sposób zyskujesz nienaganny wygląd otoczenia pomnika oraz pewność, że całość zachowa estetykę i stabilność przez dekady."
                  price: "od 1000 PLN"
                  image: "leveling.jpg" # Uwaga: upewnij się, że plik jest w folderze products/addons lub zmień folder w filepickerze
                  alt_text: "Wylewka i okładzina"

              fields:
                .name:
                  type: text
                  label: Nazwa (Menu)
                .title:
                  type: text
                  label: Tytuł (Nagłówek treści)
                .short_desc:
                  type: textarea
                  label: Krótki opis (Menu)
                .full_desc:
                  type: textarea
                  label: Pełny opis (Treść)
                .price:
                  type: text
                  label: Cena
                .image:
                  type: filepicker
                  label: Zdjęcie
                  folder: 'theme@:/images/products/addons'
                  preview_images: true
                .alt_text:
                  type: text
                  label: Alt Text

        # ==========================================================
        # ZAKŁADKA 5: CECHY (FEATURES) - Z DEFAULTAMI
        # ==========================================================
        features_tab:
          type: tab
          title: ⭐ Cechy
          fields:
            header.features_title:
              type: text
              label: Tytuł sekcji Cechy
              default: "Cechy produktu"
            header.features_subtitle:
              type: textarea
              label: Podtytuł sekcji Cechy
            
            header.features:
              type: list
              label: Lista Cech (Ikony)
              # --------------------------------------------------------
              # DOMYŚLNE CECHY
              # --------------------------------------------------------
              default:
                - title: "Mrozoodporność i niska nasiąkliwość"
                  text: "Granit wyróżnia się niską porowatością, dlatego jest całkowicie odporny na deszcz, śnieg i skrajne temperatury."
                  icon: "tombstone.svg"
                  alt: "Ikona nagrobka odpornego na mróz"
                - title: "Trwały poler"
                  text: "Granitowe płyty poddajemy mechanicznej obróbce, która zamyka pory kamienia, tworząc idealnie gładką, lustrzaną taflę, odporną na osadzanie się mchu i brudu. Taka powierzchnia ułatwia czyszczenie pomnika."
                  icon: "tombstone.svg"
                  alt: "Ikona trwałego poleru"
                - title: "Gwarancja satysfakcji"
                  text: "Twoje zadowolenie jest naszym priorytetem. Służymy wsparciem na każdym etapie realizacji zamówienia."
                  icon: "tombstone.svg"
                  alt: "Ikona gwarancji"

              fields:
                .title:
                  type: text
                  label: Tytuł cechy
                .text:
                  type: textarea
                  label: Opis cechy
                .icon:
                  type: text
                  label: Nazwa pliku ikony (w images/icons/)
                .alt:
                  type: text
                  label: Alt ikony

        # ==========================================================
        # ZAKŁADKA 6: GALERIA
        # ==========================================================
        gallery_tab:
          type: tab
          title: 🖼️ Galeria
          fields:
            header.gallery_items:
              type: list
              label: Zdjęcia w galerii
              fields:
                .image_filename:
                  type: filepicker
                  label: Wybierz zdjęcie
                  preview_images: true
                  folder: 'theme@:/images/products/gallery'
                .title:
                  type: text
                  label: Podpis (Alt/Overlay)

        # ==========================================================
        # ZAKŁADKA 7: FAQ - Z DEFAULTAMI
        # ==========================================================
        faq_tab:
          type: tab
          title: ❓ FAQ
          fields:
            header.faq_title:
              type: text
              label: Tytuł FAQ
              default: "Najczęstsze pytania"
            header.faq_items:
              type: list
              label: Pytania
              # --------------------------------------------------------
              # DOMYŚLNE PYTANIA FAQ
              # --------------------------------------------------------
              default:
                - question: "Jak mogę zamówić usługę?"
                  answer: "Wystarczy skontaktować się z nami przez formularz kontaktowy lub telefonicznie, a nasz zespół poprowadzi Cię krok po kroku przez cały proces, od wyboru materiału po finalizację zamówienia."
                - question: "Ile trwa realizacja zamówienia?"
                  answer: "Standardowy czas realizacji to od 2 do 4 tygodni, w zależności od złożoności projektu i dostępności wybranych materiałów. Zawsze informujemy o przewidywanym terminie na etapie składania zamówienia."
                - question: "Czy mogę liczyć na wsparcie po wykonaniu usługi?"
                  answer: "Oczywiście. Oferujemy pełne wsparcie posprzedażowe, w tym porady dotyczące konserwacji i pielęgnacji. Jesteśmy do Twojej dyspozycji w razie jakichkolwiek pytań."
                - question: "Czy oferujecie gwarancję na swoje produkty?"
                  answer: "Tak, wszystkie nasze produkty objęte są wieloletnią gwarancją. Jesteśmy pewni jakości naszych materiałów i wykonania, dlatego zapewniamy pełne bezpieczeństwo Twojej inwestycji."

              fields:
                .question:
                  type: text
                  label: Pytanie
                .answer:
                  type: textarea
                  label: Odpowiedź

        # ==========================================================
        # ZAKŁADKA 8: ARTYKUŁY - Z DEFAULTAMI
        # ==========================================================
        articles_tab:
          type: tab
          title: 📰 Artykuły
          fields:
            header.articles_title:
              type: text
              label: Tytuł sekcji Artykuły
              default: "Dowiedz się więcej z naszych artykułów"
            header.articles_text:
              type: textarea
              label: Tekst wprowadzający
              default: "Dowiedz się więcej o naszych usługach kamieniarskich, projektowaniu nagrobków i renowacji pomników poprzez nasze artykuły i porady ekspertów."
            
            header.articles:
              type: list
              label: Wybrane artykuły
              # --------------------------------------------------------
              # DOMYŚLNE ARTYKUŁY
              # --------------------------------------------------------
              default:
                - title: "Nowoczesne trendy w kamieniarstwie"
                  hero_subtitle: "Innowacje i Design"
                  description: "Odkryj minimalistyczne formy i innowacyjne materiały, które zyskują na popularności w projektowaniu nagrobków."
                  image_src: "services-photo.jpg"
                  url: "#"
                  date: "20-09-2025"
                  category: "Inspiracje"
                - title: "Jak dbać o nagrobek z granitu?"
                  hero_subtitle: "Poradnik Pielęgnacji"
                  description: "Praktyczne porady dotyczące czyszczenia i konserwacji granitu, aby zachował swój blask na długie lata."
                  image_src: "stones-photo-2.jpg"
                  url: "#"
                  date: "15-09-2025"
                  category: "Porady"
                - title: "Personalizacja pomnika – co warto wiedzieć?"
                  hero_subtitle: "Unikalny Charakter"
                  description: "Od grawerunku po rzeźbę - poznaj możliwości personalizacji, które nadadzą pomnikowi unikalny charakter."
                  image_src: "stones-photo.jpg"
                  url: "#"
                  date: "10-09-2025"
                  category: "Wiedza"

              fields:
                .title:
                  type: text
                  label: Tytuł
                .hero_subtitle:
                  type: text
                  label: Podtytuł
                .description:
                  type: textarea
                  label: Zajawka
                .image_src:
                  type: filepicker
                  label: Obrazek
                  folder: 'theme@:/images/articles'
                  # Zmieniłem folder na 'articles' zgodnie z logiką, 
                  # ale jeśli trzymasz je gdzie indziej, popraw tutaj.
                .url:
                  type: text
                  label: Link
                .date:
                  type: text # Zmieniłem na text, bo format daty w defaultach YAML może być kapryśny
                  label: Data
                .category:
                  type: text
                  label: Kategoria