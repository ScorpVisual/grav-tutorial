<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karuzela Produktów - Działająca Wersja</title>
    <script src="https://cdn.tailwindcss.com"></script> <style>
        /* ======================================================= */
        /* SKOMPILOWANY KOD CSS (Z POPRZEDNIEGO SCSS)         */
        /* ======================================================= */
        .product-carousel-module {
          position: relative;
          max-width: 1152px;
          margin: 4rem auto;
          padding: 0 1rem;
        }
        .product-carousel-module .carousel-intro {
          text-align: center;
          margin-bottom: 3rem;
        }
        .product-carousel-module .carousel-intro h2 {
          font-size: 2.25rem;
          font-weight: 700;
          color: #1f2937;
        }
        .product-carousel-module .carousel-intro p {
          max-width: 672px;
          margin: 1rem auto 0;
          font-size: 1.125rem;
          color: #4b5563;
        }
        .product-carousel-module__viewport {
          position: relative;
          overflow: hidden;
        }
        .product-carousel-module__track {
          display: flex;
          align-items: center;
          position: relative;
          transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .product-carousel-module__slide {
          flex-shrink: 0;
          width: 100%;
          padding: 0 0.5rem;
          cursor: pointer;
          transform: scale(0.85);
          opacity: 0.6;
          transition: transform 0.5s ease, opacity 0.5s ease;
        }
        @media (min-width: 768px) {
          .product-carousel-module__slide {
            width: 50%;
          }
        }
        @media (min-width: 1024px) {
          .product-carousel-module__slide {
            width: 40%;
          }
        }
        .product-carousel-module__slide.is-active {
          transform: scale(1);
          opacity: 1;
        }
        .product-carousel-module__slide .slide-content {
          position: relative;
          overflow: hidden;
          border-radius: 0.5rem;
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
          transition: box-shadow 0.3s ease;
        }
        .product-carousel-module__slide .slide-content:hover {
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .product-carousel-module__slide .slide-content img {
          display: block;
          width: 100%;
          aspect-ratio: 4/5;
          object-fit: cover;
        }
        .product-carousel-module__slide .slide-content .overlay {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: flex-end;
          background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
          padding: 1.5rem;
        }
        .product-carousel-module__slide .slide-content .overlay h3 {
          font-size: 1.25rem;
          font-weight: 600;
          color: white;
        }
        .product-carousel-module__nav--prev, .product-carousel-module__nav--next {
          position: absolute;
          top: 50%;
          z-index: 20;
          transform: translateY(-50%);
          border-radius: 9999px;
          background-color: rgba(255, 255, 255, 0.9);
          padding: 0.75rem;
          color: #374151;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
          transition: background-color 0.2s, transform 0.2s;
          border: none;
          cursor: pointer;
        }
        .product-carousel-module__nav--prev:hover, .product-carousel-module__nav--next:hover {
          background-color: white;
          transform: translateY(-50%) scale(1.1);
        }
        .product-carousel-module__nav--prev svg, .product-carousel-module__nav--next svg {
          width: 1.5rem;
          height: 1.5rem;
        }
        .product-carousel-module__nav--prev {
          left: 0;
          transform: translateY(-50%) translateX(-50%);
        }
        .product-carousel-module__nav--next {
          right: 0;
          transform: translateY(-50%) translateX(50%);
        }
        .product-carousel-module__info-card {
          max-width: 896px;
          margin: 3rem auto 0;
          background-color: white;
          border-radius: 0.5rem;
          padding: 2rem;
          text-align: center;
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
          transition: opacity 0.3s ease-in-out;
        }
        @media (min-width: 768px) {
          .product-carousel-module__info-card {
            padding: 3rem;
          }
        }
        .product-carousel-module__info-card.is-fading {
          opacity: 0;
        }
        .product-carousel-module__info-card .card-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
          color: #1f2937;
        }
        .product-carousel-module__info-card .product-carousel__title {
          font-size: 1.875rem;
          font-weight: 700;
          color: #111827;
        }
        .product-carousel-module__info-card .product-carousel__price {
          font-size: 1.5rem;
          font-weight: 500;
          color: #c81e1e;
        }
        .product-carousel-module__info-card .product-carousel__description {
          margin-top: 0.5rem;
          min-height: 72px;
          font-size: 1.125rem;
          line-height: 1.6;
          color: #4b5563;
        }
        .product-carousel-module__info-card .actions {
          margin-top: 1.5rem;
          display: flex;
          flex-direction: column;
          gap: 1rem;
          width: 100%;
        }
        @media (min-width: 640px) {
          .product-carousel-module__info-card .actions {
            flex-direction: row;
            width: auto;
          }
        }
        .product-carousel-module__info-card .actions a {
          display: block;
          padding: 0.75rem 2rem;
          border-radius: 0.5rem;
          font-weight: 600;
          text-decoration: none;
          transition: background-color 0.2s;
        }
        .product-carousel-module__info-card .actions a.btn-primary {
          background-color: #1f2937;
          color: white;
        }
        .product-carousel-module__info-card .actions a.btn-primary:hover {
          background-color: #111827;
        }
        .product-carousel-module__info-card .actions a.btn-cta {
          background-color: #c81e1e;
          color: white;
        }
        .product-carousel-module__info-card .actions a.btn-cta:hover {
          background-color: #a01818;
        }
    </style>
</head>
<body class="bg-gray-100">

    <section 
      class="product-carousel-module js-product-carousel-module" 
      data-products='[
        {"name":"Nagrobek Nowoczesny N-01","image":"https://placehold.co/600x750/334155/ffffff?text=N-01","alt_text":"Nagrobek nowoczesny z białego granitu","title":"Nagrobek Nowoczesny N-01","price":"od 6 499 PLN","link":"#link-do-n01","full_desc":"Model N-01 to kwintesencja nowoczesnego designu..."},
        {"name":"Nagrobek Klasyczny K-08","image":"https://placehold.co/600x750/7f1d1d/ffffff?text=K-08","alt_text":"Nagrobek klasyczny z czarnego granitu","title":"Nagrobek Klasyczny K-08","price":"od 5 999 PLN","link":"#link-do-k08","full_desc":"Klasyczny nagrobek K-08 to ponadczasowy wybór..."},
        {"name":"Nagrobek Artystyczny A-12","image":"https://placehold.co/600x750/7e22ce/ffffff?text=A-12","alt_text":"Nagrobek artystyczny z rzeźbą","title":"Nagrobek Artystyczny A-12","price":"od 14 999 PLN","link":"#link-do-a12","full_desc":"Ten model to prawdziwe dzieło sztuki kamieniarskiej..."}
      ]'
    >
      <div class="carousel-intro">
          <h2>Odkryj nasze realizacje</h2>
          <p>Przejrzyj wybrane przez nas projekty i znajdź inspirację dla siebie.</p>
      </div>
      <div class="product-carousel-module__viewport">
          <div class="product-carousel-module__track"></div>
      </div>
      <button class="product-carousel-module__nav--prev" aria-label="Poprzedni produkt">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
      </button>
      <button class="product-carousel-module__nav--next" aria-label="Następny produkt">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
      </button>
      <div class="product-carousel-module__info-card">
        <div class="card-content">
          <h3 class="product-carousel__title"></h3>
          <div class="product-carousel__price"></div>
          <p class="product-carousel__description"></p>
          <div class="actions">
            <a href="#" class="btn-primary product-carousel__link">Zobacz szczegóły</a>
            <a href="#kontakt" class="btn-cta">Zapytaj o ten model</a>
          </div>
        </div>
      </div>
    </section>
    
    <script>
        // CAŁY KOD JAVASCRIPT Z PLIKU _gallery.js
        document.addEventListener('DOMContentLoaded', () => {
          function initProductCarousel() {
            const modules = document.querySelectorAll('.js-product-carousel-module');
            modules.forEach(module => {
              let productsData = [];
              try {
                productsData = JSON.parse(module.dataset.products || '[]');
                if (!productsData.length) return;
              } catch (err) {
                console.error('Błąd parsowania danych JSON:', err, module);
                return;
              }
              const viewport = module.querySelector('.product-carousel-module__viewport');
              const track = module.querySelector('.product-carousel-module__track');
              const infoCard = module.querySelector('.product-carousel-module__info-card');
              const infoTitle = module.querySelector('.product-carousel__title');
              const infoPrice = module.querySelector('.product-carousel__price');
              const infoDesc = module.querySelector('.product-carousel__description');
              const infoLink = module.querySelector('.product-carousel__link');
              const nextBtn = module.querySelector('.product-carousel-module__nav--next');
              const prevBtn = module.querySelector('.product-carousel-module__nav--prev');
              if (!track || !infoCard) return;
              track.innerHTML = productsData.map(product => `
                <div class="product-carousel-module__slide product-img">
                  <div class="slide-content">
                    <img src="${product.image}" alt="${product.alt_text}" loading="lazy">
                    <div class="overlay">
                      <h3>${product.name}</h3>
                    </div>
                  </div>
                </div>
              `).join('');
              const slides = module.querySelectorAll('.product-carousel-module__slide');
              if (!slides.length) return;
              let current = 0;
              const total = slides.length;
              function updateCarousel(targetIndex) {
                if (targetIndex < 0 || targetIndex >= total) return;
                const targetSlide = slides[targetIndex];
                if (!targetSlide) return;
                const viewportCenter = viewport.offsetWidth / 2;
                const slideCenter = targetSlide.offsetLeft + (targetSlide.offsetWidth / 2);
                const offset = viewportCenter - slideCenter;
                track.style.transform = `translateX(${offset}px)`;
                slides.forEach((slide, idx) => {
                  slide.classList.toggle('is-active', idx === targetIndex);
                });
                current = targetIndex;
                const data = productsData[targetIndex];
                if (!data) return;
                infoCard.classList.add('is-fading');
                setTimeout(() => {
                  if (infoTitle) infoTitle.textContent = data.title;
                  if (infoPrice) infoPrice.textContent = data.price;
                  if (infoDesc) infoDesc.textContent = data.full_desc;
                  if (infoLink) infoLink.href = data.link || '#';
                  infoCard.classList.remove('is-fading');
                }, 300);
              }
              nextBtn?.addEventListener('click', () => updateCarousel((current + 1) % total));
              prevBtn?.addEventListener('click', () => updateCarousel((current - 1 + total) % total));
              slides.forEach((slide, idx) => {
                slide.addEventListener('click', () => {
                  if (idx !== current) updateCarousel(idx);
                });
              });
              updateCarousel(0);
            });
          }
          // Inicjalizujemy tylko karuzelę produktów dla tego testu
          initProductCarousel();
        });
    </script>
</body>
</html>
